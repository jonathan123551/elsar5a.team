; --- Uploads (large photos) --------------------------------------------
; Phone cameras routinely emit 5–12 MB JPEGs; allow ~8 of them per
; multipart request before PHP rejects the body. Keep this in sync
; with `client_max_body_size` in nginx.conf.
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 30

; Resizing / Cloudinary-uploading a 50-megapixel JPEG with
; Intervention\Image briefly holds the decoded bitmap in memory
; (~4 bytes per pixel). 512M gives plenty of headroom.
memory_limit = 512M

; 5 minutes covers slow cellular uploads end-to-end. Must be ≥ the
; nginx fastcgi_*_timeout values.
max_execution_time = 300
max_input_time = 300

; --- OPcache (production) ----------------------------------------------
; OPcache caches compiled PHP bytecode in shared memory so each request
; doesn't re-parse Laravel's ~thousand-file boot graph. This is the
; single biggest TTFB win we can get without touching application code.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; JIT — measured wins on Laravel are modest but free.
opcache.jit_buffer_size = 64M
opcache.jit = tracing

; --- Realpath cache ----------------------------------------------------
; Composer autoloads thousands of files; bumping the realpath cache
; reduces stat() syscalls on every request.
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Quiet noisy "PHP Notice: ..." headers in prod
expose_php = Off
