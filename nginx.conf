# Templated at container start with `envsubst` so we honor Railway's
# dynamic $PORT. See docker-entrypoint.sh.
server {
    listen 0.0.0.0:${PORT};
    server_name _;
    root /app/public;

    index index.php index.html;

    # --- Upload limits ------------------------------------------------------
    # 100MB cap covers typical Egyptian-network phone photo bursts (5–10MB
    # each, often uploaded in batches). The PHP `upload_max_filesize` /
    # `post_max_size` in php.ini match this.
    client_max_body_size 100M;

    # Bigger in-memory body buffer = fewer spillovers to /tmp during slow
    # cellular uploads.
    client_body_buffer_size 512k;

    # How long nginx will wait for *the next* chunk of the request body
    # from the client. Default 60s drops half-uploaded photos on flaky
    # 3G. 5 minutes is enough for a 100MB upload on a 500kbit link.
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;
    keepalive_timeout 65s;

    # --- Compression --------------------------------------------------------
    # Railway's edge proxy does NOT auto-compress origin responses, so we
    # have to gzip here. Brotli would need an out-of-tree module; skipping.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/manifest+json
        application/vnd.api+json
        application/wasm
        image/svg+xml
        image/x-icon
        font/ttf
        font/otf
        font/eot;

    # Note: `gzip_vary on` above already emits `Vary: Accept-Encoding` for
    # any gzipped response, so we don't add it at the server level (would
    # produce a duplicate header on the dynamic Laravel routes).

    # --- Static asset caching ----------------------------------------------
    # Long-lived cache for binary assets (images, fonts) under /public.
    # These ship with content-addressable URLs (e.g. /images/sarkha-logo.png)
    # and rarely change; if they do change the operator bumps the path.
    location ~* \.(?:png|jpe?g|gif|webp|avif|svg|ico|ttf|otf|eot|woff2?)$ {
        access_log off;
        # `add_header` resets inheritance, so we re-declare Vary here.
        # `expires` is intentionally omitted — it would emit a second
        # `Cache-Control` header next to ours.
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # Build artifacts (Vite manifests, hashed JS/CSS). Marked immutable
    # because Vite/Mix hash these by content.
    location /build/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # robots.txt / favicon.ico — short-cache but no Laravel boot needed.
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800" always;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # --- Laravel front controller ------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Faster TTFB on slightly larger responses (rendered Blade pages)
        # without blowing memory.
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;

        # Stream the request body straight to php-fpm instead of
        # buffering the entire upload in nginx first. This is the main
        # reason large-photo uploads on Railway used to hang for a
        # minute and then 504 — nginx wouldn't even hand off to
        # Laravel/Cloudinary until the whole body landed locally.
        fastcgi_request_buffering off;

        # Match the PHP-side `max_execution_time` / `max_input_time`.
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    # Block dotfiles (e.g. .env, .git) just in case.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
