; Use a TCP socket so nginx (which runs in the same container) can reach php-fpm.
[www]
listen = 127.0.0.1:9000

; Keep the pool small and dynamic — Render's free instances have very little RAM.
pm = dynamic
pm.max_children = 8
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Surface FPM logs to stderr so Render captures them.
catch_workers_output = yes
decorate_workers_output = no

; Recycle children that hang
request_terminate_timeout = 60s
